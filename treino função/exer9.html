<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let usuarios = []


        function AdicionarUsuario(nome, idade){

        usuarios.push({
        nome:nome,
        idade:idade
        })
        }

        function ListarUsuarios(){
             for (let usuario of usuarios){
                console.log(usuario)
             }
        }

        AdicionarUsuario("lari", 18)
        ListarUsuarios()
    </script>
</body>
</html>

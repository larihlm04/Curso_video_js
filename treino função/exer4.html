<body>
    <script>
        let usuario = {
        nome:"ana",
        nota: 8
        }

        function VerificarNota(usuario){
            
                if(usuario.nota >= 6){
                    console.log(usuario.nome + " " + "aprovada")
                } else if (usuario.nota < 6) {
                    console.log(usuario.nome + "reprovada")
                }
            }
        

        VerificarNota(usuario)
    </script>

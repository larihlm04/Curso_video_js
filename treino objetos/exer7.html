<body>
    <script>
        let alunos = [
 {nome:"Ana", nota:8},
 {nome:"Pedro", nota:5},
 {nome:"Carlos", nota:9}
]
 for (let aluno of alunos){ //percorrer a array dos objetos 
 if(aluno.nota >= 6){
    console.log(aluno.nome + " ", "passou")
 } else if (aluno.nota < 6){
    console.log(aluno.nome + " ", "reprovou")
 }
}
    </script>
